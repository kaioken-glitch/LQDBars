[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

; ── Process 1: Main app  (npm start) ──────────────────────────────────────────
[program:app]
command=npm start
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",PORT="3000"

; ── Process 2: YouTube converter  (node server/youtube-converter.js) ──────────
; ⚠️  Adjust the path if your file is named differently or lives elsewhere
[program:ytconverter]
command=node Backend/youtube-converter.js
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",PORT="3001"